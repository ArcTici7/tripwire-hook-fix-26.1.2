name: Build Plugin
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # This setup-gradle action installs Gradle for you automatically
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # We run 'gradle build' directly instead of './gradlew'
      - name: Build with Gradle
        run: gradle build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TripwireRestorer-Jar
          path: build/libs/*.jar
